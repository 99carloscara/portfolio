<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Enlaces de Cine</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica', sans-serif;
      background-color: #000;
      overflow-x: hidden;
      cursor: none;
    }

    .container {
      position: relative;
      width: 100%;
      animation: fadeIn 1s ease-out both;
    }

    .background {
      width: 100%;
      height: auto;
      display: block;
    }

    .link {
      position: absolute;
      color: #0066ff;
      font-size: 1.4vw;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      line-height: 1.4;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
      transition: transform 0.3s ease, text-shadow 0.3s ease, color 0.3s ease;
      padding: 0.5em;
    }

    .link:hover {
      transform: scale(1.1);
      text-shadow: 0 0 12px rgba(0,102,255,0.9);
    }

    /* Versión escritorio */
    .amor       { top: 15%; left: 13%; }
    .puerta     { top: 15%; right: 13%; }
    .apariencia { bottom: 10%; left: 13%; }
    .no-salgo   { bottom: 10%; right: 13%; }
    .billete    { top: 48%; left: 50%; transform: translateX(-50%); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cursor {
      position: absolute;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(0, 204, 255, 0.8) 0%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: all 0.1s ease;
    }

    /* 📱 Versión móvil con ubicaciones exactas */
    @media (max-width: 768px) {
      .background {
        content: url("cinevertical.png");
      }

      .link {
        font-size: 5vw;
        padding: 0.8em;
        transform: none !important;
      }

      .amor       { top: 18%; left: 8%; }
      .puerta     { top: 29.5%; left: 12%; }
      .apariencia { top: 42.5%; left: 10%; }
      .no-salgo   { top: 55%; left: 9%; }
      .billete    { top: 70%; left: 14%; }

      .cursor {
        display: none;
      }

      body {
        cursor: default;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="cine.png" alt="Fondo" class="background" />

    <a href="amor-tizar.html" class="link amor">amor-tizar mi tiempo<br>(cortometraje 17:54)</a>
    <a href="lapuerta.html" class="link puerta">la puerta<br>(cortometraje 02:27)</a>
    <a href="alapariencia.html" class="link apariencia">la apariencia por el culo<br>(cortometraje 08:09)</a>
    <a href="nosalgomas.html" class="link no-salgo">no salgo más<br>(webserie 04:09)</a>
    <a href="billete.html" class="link billete">billete de ida<br>(videoclip 03:07)</a>
  </div>

  <div class="cursor"></div>

  <script>
    const cursor = document.querySelector('.cursor');

    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth > 768) {
        cursor.style.left = `${e.clientX}px`;
        cursor.style.top = `${e.clientY}px`;
      }
    });
  </script>
</body>
</html>

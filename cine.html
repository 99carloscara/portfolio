<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Enlaces de Cine (Móvil)</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica', sans-serif;
      background-color: #000;
    }

    .container {
      position: relative;
      width: 100%;
    }

    .background {
      width: 100%;
      height: auto;
      display: block;
    }

    .link {
      position: absolute;
      color: #0000FF;
      font-size: 4.2vw;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.6);
      width: 40%;
      line-height: 1.4;
    }

    /* Posicionamiento en huecos blancos */
    .amor {
      top: 10%;
      left: 5%;
    }

    .puerta {
      top: 10%;
      right: 5%;
    }

    .apariencia {
      top: 40%;
      left: 30%;
    }

    .no-salgo {
      bottom: 12%;
      left: 5%;
    }

    .billete {
      bottom: 12%;
      right: 5%;
    }

    @media (min-width: 769px) {
      .container { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="cinevertical.png" alt="Fondo móvil" class="background" />

    <a href="amor-tizar.html" class="link amor">amor-tizar mi tiempo<br>(cortometraje 17:54)</a>
    <a href="lapuerta.html" class="link puerta">la puerta<br>(cortometraje 02:27)</a>
    <a href="alapariencia.html" class="link apariencia">la apariencia por el culo<br>(cortometraje 08:09)</a>
    <a href="nosalgomas.html" class="link no-salgo">no salgo más<br>(webserie 04:09)</a>
    <a href="billete.html" class="link billete">billete de ida<br>(videoclip 03:07)</a>
  </div>
</body>
</html>

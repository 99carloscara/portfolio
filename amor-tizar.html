<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amor-tizar mi tiempo</title>
  <style>
  
    body {
      margin: 0;
      padding: 0;
      background: 
        /* Línea azul superior */
        linear-gradient(to bottom, #0066ff 2px, transparent 2px) top / 100% 10px,
        /* Línea azul inferior */
        linear-gradient(to top, #0066ff 2px, transparent 2px) bottom / 100% 10px,
        /* Imagen de fondo */
        url('amortizarvertical.png') no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Líneas decorativas (azul intenso) */
    .linea-superior {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #0066ff;
      box-shadow: 0 2px 8px rgba(0, 102, 255, 0.8);
      z-index: 5;
    }

    .linea-inferior {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #0066ff;
      box-shadow: 0 -2px 8px rgba(0, 102, 255, 0.8);
      z-index: 5;
    }

    .video-container {
      width: 15%;
      aspect-ratio: 1;
      position: fixed;
      bottom: 20px; /* Lo movemos hacia el fondo */
      left: 50%;
      transform: translateX(-50%); /* Lo centramos en la pantalla */
      border: 2px solid rgba(0, 102, 255, 0.5);
      border-radius: 4px;
      box-shadow: 0 0 12px rgba(0,102,255,0.7);
      z-index: 10;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .background-expander {
      min-height: 100vh;
      min-width: 100vw;
    }

    /* Adaptación para móviles */
    @media screen and (max-width: 768px) {
      body {
        background-image: url('amortizarvertical.png');
        background-size: cover;
      }

      .linea-superior, .linea-inferior {
        height: 3px;
      }

      /* Video más pequeño y abajo */
      .video-container {
        width: 60%; /* Reducimos el tamaño del video */
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%); /* Centrado */
        z-index: 10;
      }

      .background-expander {
        height: 120vh; /* Aseguramos que el fondo expanda */
      }
    }
  </style>
</head>
<body>

  <!-- Líneas azules decorativas -->
  <div class="linea-superior"></div>
  <div class="linea-inferior"></div>

  <!-- Video -->
  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/Av31VrT7YVs" 
            frameborder="0" 
            allowfullscreen></iframe>
  </div>

  <!-- Fuerza scroll -->
  <div class="background-expander"></div>

</body>
</html>

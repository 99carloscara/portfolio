<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amor-tizar mi tiempo</title>
  <style>
  
    body {
      margin: 0;
      padding: 0;
      background: 
        /* Línea azul superior */
        linear-gradient(to bottom, #0066ff 2px, transparent 2px) top / 100% 10px,
        /* Línea azul inferior */
        linear-gradient(to top, #0066ff 2px, transparent 2px) bottom / 100% 10px,
        /* Imagen de fondo */
        url('amor-tizar mi tiempo.png') no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Líneas decorativas (azul intenso) */
    .linea-superior {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #0066ff;
      box-shadow: 0 2px 8px rgba(0, 102, 255, 0.8);
      z-index: 5;
    }

    .linea-inferior {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #0066ff;
      box-shadow: 0 -2px 8px rgba(0, 102, 255, 0.8);
      z-index: 5;
    }

    .video-container {
      width: 22%;
      aspect-ratio: 1;
      position: fixed;
      bottom: 100px;
      right: calc(30px + 200px);
      border: 2px solid rgba(0, 102, 255, 0.5);
      border-radius: 4px;
      box-shadow: 0 0 12px rgba(0,102,255,0.7);
      z-index: 10;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .background-expander {
      min-height: 100vh;
      min-width: 100vw;
    }
  </style>
</head>
<body>

  <!-- Líneas azules decorativas -->
  <div class="linea-superior"></div>
  <div class="linea-inferior"></div>

  <!-- Video -->
  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/Av31VrT7YVs" 
            frameborder="0" 
            allowfullscreen></iframe>
  </div>

  <!-- Fuerza scroll -->
  <div class="background-expander"></div>

</body>
</html>

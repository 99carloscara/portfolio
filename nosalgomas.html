<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NO SALGO MÁS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: 
        /* Líneas neón AZULES como lapuerta.html */
        linear-gradient(to bottom, #0066ff 2px, transparent 2px) top / 100% 10px,
        linear-gradient(to top, #0066ff 2px, transparent 2px) bottom / 100% 10px,
        /* Tu imagen de fondo */
        url('nosalgomas.png.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      overflow-x: hidden;
      animation: fadeInBody 1.5s ease-out both;
      cursor: none;
    }

    @keyframes fadeInBody {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Líneas AZULES idénticas a lapuerta.html */
    .linea-superior,
    .linea-inferior {
      position: fixed;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0066ff, #66aaff, #0066ff);
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.8);
      animation: glow 3s ease-in-out infinite;
      z-index: 5;
    }

    .linea-superior { top: 0; }
    .linea-inferior { bottom: 0; }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 102, 255, 0.8); }
      50% { box-shadow: 0 0 20px rgba(0, 102, 255, 1); }
    }

    /* Video IDÉNTICO a lapuerta.html */
    .video-container {
      width: 22%;
      aspect-ratio: 1;
      position: fixed;
      bottom: 100px;
      right: calc(30px + 200px);
      border: 2px solid rgba(0, 102, 255, 0.5);
      border-radius: 4px;
      box-shadow: 0 0 12px rgba(0,102,255,0.7);
      z-index: 10;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Permite scroll para ver toda la imagen */
    .background-expander {
      min-height: 120vh;
      min-width: 100vw;
    }

    /* Cursor azul como lapuerta.html */
    .cursor {
      position: absolute;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(0, 204, 255, 0.8) 0%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: all 0.1s ease;
    }
  </style>
</head>
<body>

  <!-- Líneas neón AZULES -->
  <div class="linea-superior"></div>
  <div class="linea-inferior"></div>

  <!-- Video con tu enlace -->
  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/eVUI072l0tM?start=38" frameborder="0" allowfullscreen></iframe>
  </div>

  <!-- Permite scroll para ver toda la imagen -->
  <div class="background-expander"></div>
  
  <!-- Cursor azul -->
  <div class="cursor"></div>

  <script>
    // Cursor idéntico a lapuerta.html
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = `${e.clientX}px`;
      cursor.style.top = `${e.clientY}px`;
    });

    // Verificador de imagen
    window.addEventListener('load', function() {
      const img = new Image();
      img.src = './nosalgomas.png.png';
      
      img.onerror = function() {
        console.error("Error: No se encuentra nosalgomas.png.png");
      };
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carlos Cara</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
      cursor: none;
    }

    .web { display: block; }
    .movil { display: none; }

    .contenedor-imagen {
      width: 100%;
      position: relative;
    }

    .imagen-fondo {
      width: 100%;
      height: auto;
      display: block;
    }

    .cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 30%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.1s ease, background 0.2s ease;
      z-index: 10000;
    }

    .cursor-hover {
      transform: scale(1.5);
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 50%, rgba(255, 255, 255, 0) 80%);
    }

    .area-click {
      position: absolute;
      z-index: 10;
      background: transparent;
      transition: all 0.4s ease-in-out;
      animation: pulsar 2s infinite ease-in-out;
      cursor: none;
    }

    .area-click:hover {
      background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(0, 0, 0, 0.3));
      transform: scale(1.15) rotate(5deg) translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    @keyframes pulsar {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* POSICIONES WEB ORIGINALES */
    .fotografia { top: 10%; left: 10%; width: 30%; height: 25%; }
    .nombre { top: 40%; left: 35%; width: 30%; height: 25%; z-index: 50; }
    .cine { top: 10%; right: 10%; width: 35%; height: 35%; }
    .diseno { bottom: 10%; right: 5%; width: 30%; height: 25%; }

    .ilustracion-foto, 
    .ilustracion-cine, 
    .ilustracion-diseno, 
    .ilustracion-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .ilustracion-logo { object-fit: contain; }

    .area-click:hover .ilustracion-foto,
    .area-click:hover .ilustracion-cine,
    .area-click:hover .ilustracion-diseno,
    .area-click:hover .ilustracion-logo {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .linea-superior, .linea-inferior {
      position: fixed;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0066ff, #66aaff, #0066ff);
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.8);
      z-index: 5;
      animation: moverLineas 3s ease-in-out infinite;
    }

    .linea-superior { top: 0; }
    .linea-inferior { bottom: 0; }

    @keyframes moverLineas {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    /* VERSIÓN MÓVIL */
    @media (max-width: 768px) {
      .web { display: none; }
      .movil {
        display: block;
        width: 100%;
        height: 100vh;
        position: relative;
        background: url('homevertical.png') no-repeat center center;
        background-size: cover;
      }

      .fotografia, .diseno, .cine, .nombre {
        position: absolute;
        display: block;
        z-index: 10;
        background: transparent;
        cursor: pointer;
      }

      .fotografia:active,
      .diseno:active,
      .cine:active,
      .nombre:active {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      .fotografia {
        bottom: 5%;
        left: 5%;
        width: 40%;
        height: 20%;
      }

      .diseno {
        top: 5%;
        right: 5%;
        width: 40%;
        height: 20%;
      }

      .cine {
        top: 5%;
        left: 5%;
        width: 40%;
        height: 20%;
      }

      .nombre {
        top: 42%;
        left: 30%;
        width: 40%;
        height: 15%;
      }

      .cursor, .linea-superior, .linea-inferior {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- VERSIÓN WEB -->
  <div class="web">
    <div class="contenedor-imagen">
      <img src="web-carlos.png" alt="Carlos Cara" class="imagen-fondo">

      <a class="area-click fotografia" href="https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf%C3%ADa/full-view.html" target="_blank">
        <img src="foto-ilustracion.png" class="ilustracion-foto" alt="">
      </a>

      <div class="area-click cine" onclick="window.open('cine.html', '_blank')">
        <img src="cine-ilustracion.png" class="ilustracion-cine" alt="">
      </div>

      <div class="area-click diseno" onclick="window.open('https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html', '_blank')">
        <img src="diseno-ilustracion.png" class="ilustracion-diseno" alt="">
      </div>

      <div class="area-click nombre" onclick="window.location.href='carloscara.html'">
        <img src="logocarlos.png" class="ilustracion-logo" alt="">
      </div>
    </div>

    <div class="linea-superior"></div>
    <div class="linea-inferior"></div>
    <div class="cursor" id="cursor"></div>
  </div>

 <!-- VERSIÓN MÓVIL -->
<div class="movil">
  <a href="https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf%C3%ADa/full-view.html" class="fotografia" target="_blank">
    <span style="display:block; width:100%; height:100%;"></span>
  </a>
  <a href="https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html" class="diseno" target="_blank">
    <span style="display:block; width:100%; height:100%;"></span>
  </a>
  <a href="cine.html" class="cine">
    <span style="display:block; width:100%; height:100%;"></span>
  </a>
  <a href="carloscara.html" class="nombre">
    <span style="display:block; width:100%; height:100%;"></span>
  </a>
</div>


  <script>
    // Cursor personalizado solo en web
    const cursor = document.getElementById('cursor');
    if (cursor) {
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.pageX - cursor.offsetWidth / 2 + 'px';
        cursor.style.top = e.pageY - cursor.offsetHeight / 2 + 'px';
      });

      const areas = document.querySelectorAll('.area-click');
      areas.forEach(area => {
        area.addEventListener('mouseenter', () => {
          cursor.classList.add('cursor-hover');
        });
        area.addEventListener('mouseleave', () => {
          cursor.classList.remove('cursor-hover');
        });
      });
    }
  </script>

</body>
</html>

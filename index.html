<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carlos Cara</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
      overflow: hidden;
      cursor: none;
    }

    .contenedor-imagen {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .imagen-fondo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: none;
    }

    .imagen-fondo.desktop-only {
      display: block;
    }

    .area-click {
      position: absolute;
      z-index: 10;
      background: transparent;
      transition: all 0.4s ease-in-out;
      animation: pulsar 2s infinite ease-in-out;
      cursor: none;
    }

    .area-click:hover {
      background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(0, 0, 0, 0.3));
      transform: scale(1.15) rotate(5deg) translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    @keyframes pulsar {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .fotografia {
      top: 10%;
      left: 10%;
      width: 30%;
      height: 25%;
      overflow: visible;
    }

    .ilustracion-foto {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .area-click.fotografia:hover .ilustracion-foto {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .nombre {
      top: 40%;
      left: 35%;
      width: 30%;
      height: 25%;
      z-index: 50;
      cursor: none;
      position: absolute;
      overflow: visible;
    }

    .ilustracion-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .area-click.nombre:hover .ilustracion-logo {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .cine {
      top: 10%;
      right: 10%;
      width: 35%;
      height: 35%;
      overflow: visible;
    }

    .ilustracion-cine {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .area-click.cine:hover .ilustracion-cine {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .diseno {
      bottom: 10%;
      right: 5%;
      width: 30%;
      height: 25%;
      overflow: visible;
    }

    .ilustracion-diseno {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .area-click.diseno:hover .ilustracion-diseno {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .linea-superior, .linea-inferior {
      position: fixed;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0066ff, #66aaff, #0066ff);
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.8);
      z-index: 5;
      animation: moverLineas 3s ease-in-out infinite;
    }

    .linea-superior {
      top: 0;
    }

    .linea-inferior {
      bottom: 0;
    }

    @keyframes moverLineas {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    .cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 30%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.1s ease, background 0.2s ease;
      z-index: 10000;
    }

    .cursor-hover {
      transform: scale(1.5);
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 50%, rgba(255, 255, 255, 0) 80%);
    }

    /* Versión móvil */
    @media (max-width: 768px) {
      .imagen-fondo.desktop-only {
        display: none;
      }

      .imagen-fondo.mobile-only {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        z-index: 0;
      }

      .cursor,
      .linea-superior,
      .linea-inferior,
      .area-click {
        display: none !important;
      }

      body, html {
        overflow: hidden;
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor-imagen">
    <img src="web-carlos.png" alt="Fondo Escritorio" class="imagen-fondo desktop-only">
    <img src="homevertical.png" alt="Fondo Móvil" class="imagen-fondo mobile-only">

    <!-- FOTOGRAFÍA -->
    <div class="area-click fotografia" onclick="window.open('https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf-a/full-view.html', '_blank')">
      <img src="foto-ilustracion.png" alt="Ilustración Fotografía" class="ilustracion-foto">
    </div>

    <!-- NOMBRE / ENLACE -->
    <div class="area-click nombre" onclick="window.location.href='carloscara.html'">
      <img src="logocarlos.png" alt="Logo Carlos Cara" class="ilustracion-logo">
    </div>

    <!-- CINE -->
    <div class="area-click cine" onclick="window.open('cine.html', '_blank')">
      <img src="cine-ilustracion.png" alt="Ilustración Cine" class="ilustracion-cine">
    </div>

    <!-- DISEÑO -->
    <div class="area-click diseno" onclick="window.open('https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html', '_blank')">
      <img src="diseno-ilustracion.png" alt="Ilustración Diseño" class="ilustracion-diseno">
    </div>

    <!-- DECORACIÓN -->
    <div class="linea-superior"></div>
    <div class="linea-inferior"></div>

    <!-- CURSOR -->
    <div class="cursor" id="cursor"></div>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.pageX - cursor.offsetWidth / 2 + 'px';
      cursor.style.top = e.pageY - cursor.offsetHeight / 2 + 'px';
    });

    const areas = document.querySelectorAll('.area-click');
    areas.forEach(area => {
      area.addEventListener('mouseenter', () => {
        cursor.classList.add('cursor-hover');
      });
      area.addEventListener('mouseleave', () => {
        cursor.classList.remove('cursor-hover');
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carlos Cara</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
      cursor: none;
      height: 100%; /* Asegura que ocupe toda la pantalla */
    }

    .contenedor-imagen {
      width: 100%;
      height: 100%; /* Ocupa toda la altura de la pantalla */
      position: relative;
    }

    .imagen-fondo {
      width: 100%;
      height: 100%; /* Aseguramos que cubra toda la pantalla */
      object-fit: cover; /* Mantiene la proporción de la imagen */
      display: block;
    }

    /* Diseño de las áreas de clic para el escritorio */
    .area-click {
      position: absolute;
      z-index: 10;
      background: transparent;
      transition: all 0.4s ease-in-out;
      cursor: pointer;
    }

    .area-click:hover {
      background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(0, 0, 0, 0.3));
      transform: scale(1.15) rotate(5deg) translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    @keyframes pulsar {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Estilo para los elementos dentro del área de clic */
    .fotografia,
    .nombre,
    .cine,
    .diseno {
      position: absolute;
      width: 30%;
      height: 25%;
      z-index: 50;
      cursor: none;
    }

    /* Logo y otros elementos */
    .ilustracion-logo,
    .ilustracion-foto,
    .ilustracion-cine,
    .ilustracion-diseno {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .area-click:hover .ilustracion-logo,
    .area-click:hover .ilustracion-foto,
    .area-click:hover .ilustracion-cine,
    .area-click:hover .ilustracion-diseno {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    /* Lineas superior e inferior */
    .linea-superior, .linea-inferior {
      position: fixed;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0066ff, #66aaff, #0066ff);
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.8);
      z-index: 5;
      animation: moverLineas 3s ease-in-out infinite;
    }

    .linea-superior {
      top: 0;
    }

    .linea-inferior {
      bottom: 0;
    }

    @keyframes moverLineas {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    /* MOBILE (menor a 768px) */
    @media (max-width: 768px) {
      .imagen-fondo {
        width: 100%;
        height: 100%; /* Ahora ocupa toda la pantalla del móvil */
        object-fit: cover;
      }

      .contenedor-imagen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden; /* Evita que se salga el contenido de la pantalla */
      }

      .area-click {
        width: 80%;
        height: auto;
        margin: 20px 0;
        position: relative;
      }

      .fotografia,
      .cine,
      .diseno,
      .nombre {
        width: 80vw;
        height: 25vh;
        margin: 10px auto;
        position: relative;
      }

      .ilustracion-foto,
      .ilustracion-cine,
      .ilustracion-diseno,
      .ilustracion-logo {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* Cursor personalizado en móvil */
      .cursor {
        display: none; /* Ocultamos el cursor personalizado en móviles */
      }

      /* Ocultar las líneas decorativas en móvil */
      .linea-superior,
      .linea-inferior {
        display: none;
      }

      /* Eliminar imagenes de enlaces en móvil */
      .ilustracion-foto,
      .ilustracion-cine,
      .ilustracion-diseno,
      .ilustracion-logo {
        display: none;
      }
    }

  </style>
</head>
<body>
  <div class="contenedor-imagen">
    <img src="homevertical.png" alt="Carlos Cara" class="imagen-fondo">

    <!-- Enlace fotografía -->
    <div class="area-click fotografia">
      <a href="https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf-a/full-view.html" target="_blank">
        <img src="foto-ilustracion.png" alt="Ilustración Fotografía" class="ilustracion-foto">
      </a>
    </div>

    <!-- Enlace nombre / Carlos Cara -->
    <div class="area-click nombre">
      <a href="carloscara.html">
        <img src="logocarlos.png" alt="Logo Carlos Cara" class="ilustracion-logo">
      </a>
    </div>

    <!-- Enlace cine -->
    <div class="area-click cine">
      <a href="cine.html" target="_blank">
        <img src="cine-ilustracion.png" alt="Ilustración Cine" class="ilustracion-cine">
      </a>
    </div>

    <!-- Enlace diseño -->
    <div class="area-click diseno">
      <a href="https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html" target="_blank">
        <img src="diseno-ilustracion.png" alt="Ilustración Diseño Gráfico" class="ilustracion-diseno">
      </a>
    </div>

    <!-- Líneas superiores e inferiores -->
    <div class="linea-superior"></div>
    <div class="linea-inferior"></div>

    <!-- Cursor -->
    <div class="cursor" id="cursor"></div>

    <script>
      const cursor = document.getElementById('cursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.pageX - cursor.offsetWidth / 2 + 'px';
        cursor.style.top = e.pageY - cursor.offsetHeight / 2 + 'px';
      });

      const areas = document.querySelectorAll('.area-click');
      areas.forEach(area => {
        area.addEventListener('mouseenter', () => {
          cursor.classList.add('cursor-hover');
        });
        area.addEventListener('mouseleave', () => {
          cursor.classList.remove('cursor-hover');
        });
      });
    </script>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carlos Cara</title>
  <style>
    /* Estilos generales para todo */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
      cursor: none;
    }

    /* Fondo para la versión Web */
    .contenedor-imagen {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .imagen-fondo {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Estilos específicos para la versión Web */
    .linea-superior, .linea-inferior {
      position: fixed;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0066ff, #66aaff, #0066ff);
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.8);
      z-index: 5;
      animation: moverLineas 3s ease-in-out infinite;
    }

    .linea-superior { top: 0; }
    .linea-inferior { bottom: 0; }

    @keyframes moverLineas {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    /* Estilos para la versión móvil */
    @media (max-width: 768px) {
      .contenedor-imagen {
        background: url('homevertical.png') no-repeat center center;
        background-size: cover; /* Asegura que la imagen ocupe toda la pantalla */
        height: 100vh; /* Asegura que la imagen ocupe toda la pantalla */
      }

      /* Eliminamos la imagen web */
      .imagen-fondo {
        display: none;
      }

      /* Desactivamos las líneas en móvil */
      .linea-superior, .linea-inferior {
        display: none;
      }

      /* Estilos para los enlaces */
      .enlace {
        position: absolute;
        cursor: pointer;
        display: block;
        text-align: center;
        color: transparent;
        text-decoration: none;
      }

      .fotografia { top: 10%; left: 5%; width: 40%; height: 30%; }
      .nombre { top: 40%; left: 25%; width: 50%; height: 20%; }
      .cine { top: 10%; left: 50%; width: 40%; height: 30%; }
      .diseno { bottom: 10%; left: 5%; width: 40%; height: 30%; }
    }

  </style>
</head>
<body>
  <!-- Contenedor de la imagen de fondo -->
  <div class="contenedor-imagen">
    <!-- Imagen de fondo web -->
    <img src="web-carlos.png" alt="Carlos Cara" class="imagen-fondo">

    <!-- Enlaces de la versión móvil -->
    <a href="https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf-a/full-view.html" class="enlace fotografia" title="Fotografía"></a>
    <a href="carloscara.html" class="enlace nombre" title="Carlos Cara"></a>
    <a href="cine.html" class="enlace cine" title="Cine"></a>
    <a href="https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html" class="enlace diseno" title="Diseño Gráfico"></a>

    <!-- Líneas que solo se muestran en la versión web -->
    <div class="linea-superior"></div>
    <div class="linea-inferior"></div>
  </div>
</body>
</html>

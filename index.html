<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carlos Cara</title>
  <style>
    /* [Todo el CSS anterior se mantiene igual hasta la parte móvil] */

    /* Versión móvil - REORGANIZADA */
    @media (max-width: 768px) {
      .web { display: none; }
      .movil {
        display: block;
        width: 100%;
        height: 100vh;
        position: relative;
        background: url('homevertical.png') no-repeat center center;
        background-size: cover;
      }

      .enlace {
        position: absolute;
        display: block;
        z-index: 10;
        background: transparent;
      }

      .enlace:active {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      /* FOTOGRAFÍA - Abajo izquierda */
      .fotografia {
        bottom: 5%;
        left: 5%;
        width: 40%;
        height: 20%;
      }

      /* DISEÑO GRÁFICO - Arriba derecha */
      .diseno {
        top: 5%;
        right: 5%;
        width: 40%;
        height: 20%;
      }

      /* CINE - Arriba izquierda */
      .cine {
        top: 5%;
        left: 5%;
        width: 40%;
        height: 20%;
      }

      /* CARLOS CARA - Centro */
      .nombre {
        top: 42%;
        left: 30%;
        width: 40%;
        height: 15%;
      }

      .cursor, .linea-superior, .linea-inferior {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- VISTA WEB (se mantiene igual) -->
  <div class="web">
    <!-- [Todo el contenido web anterior se mantiene igual] -->
  </div>

  <!-- VISTA MÓVIL REORGANIZADA -->
  <div class="movil">
    <!-- DISEÑO GRÁFICO - Arriba derecha -->
    <a class="enlace diseno" href="https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html" target="_blank"></a>
    
    <!-- CINE - Arriba izquierda -->
    <a class="enlace cine" href="cine.html"></a>
    
    <!-- FOTOGRAFÍA - Abajo izquierda -->
    <a class="enlace fotografia" href="https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf-a/full-view.html" target="_blank"></a>
    
    <!-- CARLOS CARA - Centro -->
    <a class="enlace nombre" href="carloscara.html"></a>
  </div>

  <!-- [El script se mantiene igual] -->
</body>
</html>

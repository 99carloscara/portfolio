<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carlos Cara</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #000;
      cursor: none;
    }

    /* Contenedor principal */
    .contenedor-imagen {
      width: 100%;
      position: relative;
      height: 100vh; /* Ocupa toda la altura de la pantalla */
    }

    /* Imagen de fondo para web */
    .imagen-fondo {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Móvil: Imagen de fondo para dispositivos móviles */
    @media (max-width: 768px) {
      .imagen-fondo {
        display: none; /* Ocultamos la imagen de fondo para web */
      }
      .contenedor-imagen {
        background-image: url('homevertical.png');
        background-size: cover; /* Asegura que la imagen cubra toda la pantalla */
        background-position: center; /* Centra la imagen */
        background-repeat: no-repeat; /* Evita que la imagen se repita */
        height: 100vh; /* Hace que la imagen ocupe toda la altura de la pantalla */
      }
    }

    /* Estilo del cursor */
    .cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 30%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.1s ease, background 0.2s ease;
      z-index: 10000;
    }

    .cursor-hover {
      transform: scale(1.5);
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 50%, rgba(255, 255, 255, 0) 80%);
    }

    /* Áreas de clic */
    .area-click {
      position: absolute;
      z-index: 10;
      background: transparent;
      transition: all 0.4s ease-in-out;
      cursor: none;
    }

    .area-click:hover {
      background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(0, 0, 0, 0.3));
      transform: scale(1.15) rotate(5deg) translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Estilo de las imágenes dentro de los enlaces */
    .ilustracion-foto,
    .ilustracion-logo,
    .ilustracion-cine,
    .ilustracion-diseno {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
    }

    .area-click:hover .ilustracion-foto,
    .area-click:hover .ilustracion-logo,
    .area-click:hover .ilustracion-cine,
    .area-click:hover .ilustracion-diseno {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    /* FOTOGRAFÍA */
    .fotografia {
      top: 10%;
      left: 10%;
      width: 30%;
      height: 25%;
    }

    /* NOMBRE */
    .nombre {
      top: 40%;
      left: 35%;
      width: 30%;
      height: 25%;
    }

    /* CINE */
    .cine {
      top: 10%;
      right: 10%;
      width: 35%;
      height: 35%;
    }

    /* DISEÑO */
    .diseno {
      bottom: 10%;
      right: 5%;
      width: 30%;
      height: 25%;
    }

    /* LÍNEAS SUPERIOR E INFERIOR */
    .linea-superior, .linea-inferior {
      position: fixed;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0066ff, #66aaff, #0066ff);
      box-shadow: 0 0 10px rgba(0, 102, 255, 0.8);
      z-index: 5;
      animation: moverLineas 3s ease-in-out infinite;
    }

    .linea-superior {
      top: 0;
    }

    .linea-inferior {
      bottom: 0;
    }

    @keyframes moverLineas {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    /* Ajustes específicos para móvil */
    @media (max-width: 768px) {
      .area-click {
        width: 80%;
        height: 30%;
        margin: 10% auto;
      }

      .fotografia,
      .nombre,
      .cine,
      .diseno {
        width: 80%;
        height: 25vh;
        margin: 10px auto;
      }

      .linea-superior,
      .linea-inferior {
        display: none; /* Ocultamos las líneas en móvil */
      }

      .cursor {
        display: none; /* Ocultamos el cursor en móvil */
      }

      /* Ajustes a las imágenes de los enlaces */
      .ilustracion-foto,
      .ilustracion-logo,
      .ilustracion-cine,
      .ilustracion-diseno {
        display: none; /* Ocultamos las imágenes de los enlaces en móvil */
      }
    }

  </style>
</head>
<body>
  <div class="contenedor-imagen">
    <img src="web-carlos.png" alt="Carlos Cara" class="imagen-fondo">

    <!-- FOTOGRAFÍA -->
    <div class="area-click fotografia" onclick="window.open('https://www.flipsnack.com/fanzinecatalogue/portfolio-fotograf-a/full-view.html', '_blank')">
      <img src="foto-ilustracion.png" alt="Ilustración Fotografía" class="ilustracion-foto">
    </div>

    <!-- NOMBRE / ENLACE A CARLOS CARA -->
    <div class="area-click nombre" onclick="window.location.href='carloscara.html'">
      <img src="logocarlos.png" alt="Logo Carlos Cara" class="ilustracion-logo">
    </div>

    <!-- CINE -->
    <div class="area-click cine" onclick="window.open('cine.html', '_blank')">
      <img src="cine-ilustracion.png" alt="Ilustración Cine" class="ilustracion-cine">
    </div>

    <!-- DISEÑO -->
    <div class="area-click diseno" onclick="window.open('https://www.flipsnack.com/fanzinecatalogue/portfolio-carlos-cara/full-view.html', '_blank')">
      <img src="diseno-ilustracion.png" alt="Ilustración Diseño Gráfico" class="ilustracion-diseno">
    </div>
  </div>

  <!-- LÍNEAS -->
  <div class="linea-superior"></div>
  <div class="linea-inferior"></div>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.pageX - cursor.offsetWidth / 2 + 'px';
      cursor.style.top = e.pageY - cursor.offsetHeight / 2 + 'px';
    });

    const areas = document.querySelectorAll('.area-click');
    areas.forEach(area => {
      area.addEventListener('mouseenter', () => {
        cursor.classList.add('cursor-hover');
      });
      area.addEventListener('mouseleave', () => {
        cursor.classList.remove('cursor-hover');
      });
    });
  </script>
</body>
</html>

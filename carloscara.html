<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Carlos Cara</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: Helvetica, sans-serif;
      scroll-behavior: smooth;
      background-color: #000;
      color: white;
      cursor: none !important;
    }

    /* SECCIONES PRINCIPALES */
    .section {
      height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .section1 {
      background-image: url('carloscara1.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .section2 {
      position: relative;
      background-image: url('carloscara2.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .section2 img {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
      cursor: none !important;
    }

    .section2 img:hover {
      transform: translateX(-50%) scale(1.05);
    }

    /* SECCIÓN DE VIDEO */
    .video-section {
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* SECCIÓN DE CONTACTO */
    .contact {
      background-color: #00f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 0;
      transform: translateY(60px);
      filter: blur(10px);
      transition: opacity 1s ease, transform 1s ease, filter 1s ease;
      margin: 0;
      padding: 0;
    }

    .contact.visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .contact p, .contact a {
      margin: 10px;
      font-size: 1.4rem;
      color: white;
      text-decoration: none;
      cursor: none !important;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    /* CURSOR PERSONALIZADO AZUL */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 30%, rgba(255, 255, 255, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease;
      z-index: 9999;
      opacity: 1 !important;
      mix-blend-mode: normal;
    }

    .cursor-hover {
      transform: translate(-50%, -50%) scale(1.5);
      background: radial-gradient(circle, rgba(0, 102, 255, 1) 50%, rgba(255, 255, 255, 0) 80%);
    }
  </style>
</head>
<body>

  <div class="section section1"></div>

  <div class="section section2">
    <img src="carloscarafoto.png" alt="Carlos Cara Foto" />
  </div>

  <!-- SECCIÓN DE VIDEO -->
  <div class="video-section">
    <iframe width="800" height="450"
      src="https://www.youtube.com/embed/3P_bNatzeTg"
      title="Video Carlos Cara"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>

  <!-- SECCIÓN DE CONTACTO -->
  <div class="contact" id="contact">
    <p>Email: <a href="mailto:carloscaralopez@gmail.com">carloscaralopez@gmail.com</a></p>
    <p>LinkedIn: <a href="https://www.linkedin.com/in/carlos-cara-727b58109/" target="_blank">Carlos Cara</a></p>
    <p>Instagram: <a href="https://www.instagram.com/carloscaralopez" target="_blank">@carloscaralopez</a></p>
  </div>

  <!-- CURSOR PERSONALIZADO -->
  <div class="cursor" id="customCursor"></div>

  <script>
    // CURSOR PERSONALIZADO
    const cursor = document.getElementById('customCursor');

    const moveCursor = (e) => {
      cursor.style.left = `${e.clientX}px`;
      cursor.style.top = `${e.clientY}px`;
    };

    document.addEventListener('mousemove', moveCursor);

    const interactiveElements = document.querySelectorAll('a, .section2 img');

    interactiveElements.forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.classList.add('cursor-hover');
      });
      el.addEventListener('mouseleave', () => {
        cursor.classList.remove('cursor-hover');
      });
    });

    // APARICIÓN SUAVE DE CONTACTO
    const contact = document.getElementById('contact');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          contact.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    observer.observe(contact);

    window.addEventListener('load', () => {
      cursor.style.opacity = '1';
      cursor.style.display = 'block';
    });

    // OCULTAR SCROLL HORIZONTAL
    document.documentElement.style.overflowX = 'hidden';
    document.body.style.overflowX = 'hidden';
  </script>
</body>
</html>
